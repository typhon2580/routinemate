{% extends "base.html" %}

{% block content %}

<div class="form-card mx-auto shadow-sm rounded-4 p-4">
    <h2 class="fw-bold mb-3">Add Routine Task</h2>
    <p class="text-muted mb-4">
        Create a new task for your daily routine.
    </p>

    <form method="POST">
        <div class="mb-3">
            <label class="form-label">Title</label>
            <input 
                type="text" 
                name="title" 
                class="form-control" 
                placeholder="Example: Morning workout"
                required
            >
        </div>

        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea 
                name="description" 
                class="form-control" 
                rows="3"
                placeholder="Add task details"
            ></textarea>
        </div>

        <div class="row">
            <div class="col-md-4 mb-3">
                <label class="form-label">Date</label>
                <input 
                    type="date" 
                    name="task_date" 
                    class="form-control" 
                    value="{{ today }}"
                    required
                >
            </div>

            <div class="col-md-4 mb-3">
                <label class="form-label">Start Time</label>
                <input type="time" name="start_time" class="form-control">
            </div>

            <div class="col-md-4 mb-3">
                <label class="form-label">End Time</label>
                <input type="time" name="end_time" class="form-control">
            </div>
        </div>

        <div class="row">
            <div class="col-md-4 mb-3">
                <label class="form-label">Category</label>
                <select name="category" class="form-select">
                    {% for category in categories %}
                        <option value="{{ category }}">{{ category }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-md-4 mb-3">
                <label class="form-label">Priority</label>
                <select name="priority" class="form-select">
                    {% for priority in priorities %}
                        <option value="{{ priority }}" {% if priority == "Medium" %}selected{% endif %}>
                            {{ priority }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-md-4 mb-3">
                <label class="form-label">Status</label>
                <select name="status" class="form-select">
                    {% for status in statuses %}
                        <option value="{{ status }}">{{ status }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
                Save Task
            </button>

            <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary">
                Cancel
            </a>
        </div>
    </form>
</div>

{% endblock %}
