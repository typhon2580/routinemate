{% extends "base.html" %}

{% block content %}

<div class="form-card mx-auto shadow-sm rounded-4 p-4">
    <h2 class="fw-bold mb-3">Edit Routine Task</h2>
    <p class="text-muted mb-4">
        Update your routine task details.
    </p>

    <form method="POST">
        <div class="mb-3">
            <label class="form-label">Title</label>
            <input 
                type="text" 
                name="title" 
                class="form-control" 
                value="{{ task.title }}"
                required
            >
        </div>

        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea 
                name="description" 
                class="form-control" 
                rows="3"
            >{{ task.description }}</textarea>
        </div>

        <div class="row">
            <div class="col-md-4 mb-3">
                <label class="form-label">Date</label>
                <input 
                    type="date" 
                    name="task_date" 
                    class="form-control" 
                    value="{{ task.task_date }}"
                    required
                >
            </div>

            <div class="col-md-4 mb-3">
                <label class="form-label">Start Time</label>
                <input 
                    type="time" 
                    name="start_time" 
                    class="form-control"
                    value="{{ task.start_time.strftime('%H:%M') if task.start_time else '' }}"
                >
            </div>

            <div class="col-md-4 mb-3">
                <label class="form-label">End Time</label>
                <input 
                    type="time" 
                    name="end_time" 
                    class="form-control"
                    value="{{ task.end_time.strftime('%H:%M') if task.end_time else '' }}"
                >
            </div>
        </div>

        <div class="row">
            <div class="col-md-4 mb-3">
                <label class="form-label">Category</label>
                <select name="category" class="form-select">
                    {% for category in categories %}
                        <option value="{{ category }}" {% if task.category == category %}selected{% endif %}>
                            {{ category }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-md-4 mb-3">
                <label class="form-label">Priority</label>
                <select name="priority" class="form-select">
                    {% for priority in priorities %}
                        <option value="{{ priority }}" {% if task.priority == priority %}selected{% endif %}>
                            {{ priority }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-md-4 mb-3">
                <label class="form-label">Status</label>
                <select name="status" class="form-select">
                    {% for status in statuses %}
                        <option value="{{ status }}" {% if task.status == status %}selected{% endif %}>
                            {{ status }}
                        </option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
                Update Task
            </button>

            <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary">
                Cancel
            </a>
        </div>
    </form>
</div>

{% endblock %}
